<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f4f1ec;--surface:#ffffff;--surface2:#f0ece4;
    --border:#d8d0c4;--accent:#8b6d42;--accent2:#3d6e99;
    --text:#2a2420;--text-muted:#8a7e72;--r18:#c04040;
  }
  body.light{
    --bg:#f4f1ec;--surface:#ffffff;--surface2:#f0ece4;
    --border:#d8d0c4;--accent:#8b6d42;--accent2:#3d6e99;
    --text:#2a2420;--text-muted:#8a7e72;--r18:#c04040;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:"Zen Kaku Gothic New",sans-serif;min-height:100vh;}

  header{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 24px 14px;position:sticky;top:0;z-index:100;}
  .header-inner{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
  .header-btns{display:flex;gap:6px;align-items:center;flex-shrink:0;}
  .header-title{font-family:"Noto Serif JP",serif;font-size:20px;letter-spacing:.05em;color:var(--accent);}
  .header-sub{font-size:11px;color:var(--text-muted);margin-top:2px;letter-spacing:.08em;}
  .header-desc{font-size:11px;color:var(--text-muted);margin-top:5px;line-height:1.7;}
  .header-title-row{display:flex;align-items:center;gap:10px;}
  .header-btns{display:flex;gap:6px;align-items:center;flex-shrink:0;}
  .add-btn{background:rgba(200,169,126,.12);border:1px solid rgba(200,169,126,.4);color:var(--accent);padding:3px 9px;border-radius:6px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:background .2s;white-space:nowrap;}
  .add-btn:hover{background:rgba(200,169,126,.22);}
  .theme-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);padding:3px 7px;border-radius:6px;cursor:pointer;font-size:13px;transition:all .2s;}
  .theme-btn:hover{border-color:var(--accent);color:var(--accent);}

  .main{padding:20px 24px 60px;max-width:900px;margin:0 auto;}

  .section{margin-bottom:28px;}
  .section-title{font-size:14px;font-weight:700;color:var(--accent);letter-spacing:.12em;padding:7px 16px;border-left:4px solid var(--accent);background:rgba(200,169,126,.12);border-radius:0 8px 8px 0;margin-bottom:10px;box-shadow:inset 0 0 0 1px rgba(200,169,126,.15);}
  .card-list{display:flex;flex-direction:column;gap:6px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;align-items:flex-start;gap:10px;transition:border-color .15s;}
  .card:hover{border-color:var(--accent);}
  .card.hot{border-color:#e8a55a;}
  .card.hot .card-name{color:#e8820a;}
  body.light .card.hot .card-name{color:#f07800;}
  body.light .card.hot{border-color:#e89540;}
  .card-body{flex:1;min-width:0;}
  .card-name{font-size:11px;font-weight:600;color:var(--text);text-decoration:none;line-height:1.4;transition:color .15s;cursor:pointer;background:none;border:none;font-family:inherit;text-align:left;padding:0;}
  .card-name:hover{color:var(--accent);text-decoration:underline;}
  .card-meta{font-size:10px;color:var(--text-muted);margin-top:3px;line-height:1.5;}
  .card-meta .ho{color:var(--accent2);}
  .card-row1{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
  .card-ho{font-size:10px;color:#0c732b;white-space:nowrap;flex-shrink:0;}
  .card-actions{flex-shrink:0;opacity:0;transition:opacity .15s;}
  .card:hover .card-actions{opacity:1;}
  .edit-btn{background:none;border:1px solid var(--border);color:var(--text-muted);font-size:11px;padding:2px 8px;border-radius:6px;cursor:pointer;font-family:inherit;transition:all .15s;}
  .edit-btn:hover{border-color:var(--accent);color:var(--accent);}

  /* モーダル共通 */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
  .modal-overlay.open{opacity:1;pointer-events:auto;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:90%;max-width:480px;max-height:90vh;overflow-y:auto;}
  .modal-head{padding:18px 20px 0;display:flex;align-items:center;justify-content:space-between;}
  .modal-title{font-size:16px;font-weight:700;color:var(--text);}
  .modal-close{background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;padding:4px;}
  .modal-body{padding:14px 20px 20px;}
  .form-group{margin-bottom:12px;}
  .form-label{display:block;font-size:11px;color:var(--text-muted);letter-spacing:.06em;margin-bottom:4px;}
  .form-input,.form-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 10px;font-family:inherit;font-size:13px;outline:none;transition:border-color .2s;box-sizing:border-box;-webkit-appearance:none;appearance:none;}
  .form-input:focus,.form-textarea:focus{border-color:var(--accent);}
  .form-textarea{min-height:60px;resize:vertical;}
  .form-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}
  .btn-save{background:rgba(200,169,126,.15);border:1px solid var(--accent);color:var(--accent);padding:8px 20px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:background .2s;}
  .btn-save:hover{background:rgba(200,169,126,.28);}
  .btn-cancel{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);padding:8px 16px;border-radius:8px;font-family:inherit;font-size:13px;cursor:pointer;}
  .btn-cancel:hover{background:var(--border);}
  .btn-delete{background:rgba(200,126,126,.1);border:1px solid rgba(200,126,126,.4);color:var(--r18);padding:8px 16px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;margin-right:auto;}
  .btn-delete:hover{background:rgba(200,126,126,.22);}

  /* ローディング */
  #loadingBanner{display:none;position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(200,169,126,.15);backdrop-filter:blur(4px);padding:8px;justify-content:center;align-items:center;gap:8px;font-size:13px;color:var(--accent);border-bottom:1px solid var(--border);}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spin{animation:spin 1s linear infinite;display:inline-block;}

  /* スマホ */
  @media(max-width:640px){
    header{padding:12px;}
    .header-title{font-size:16px;}
    .header-sub{display:none;}
    .main{padding:10px 10px 60px;}
    .card-actions{opacity:1;}
  }
</style>
</head>
<body class="light">

<div id="loadingBanner"><span class="spin">⏳</span> 同期中…</div>

<!-- ログインモーダル -->
<div class="modal-overlay" id="loginOverlay" onclick="if(event.target===this)closeLoginDirect()">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="loginModalTitle">ログイン</div>
      <button class="modal-close" onclick="closeLoginDirect()">✕</button>
    </div>
    <div class="modal-body" id="loginBody"></div>
  </div>
</div>

<!-- 編集/追加モーダル -->
<div class="modal-overlay" id="editOverlay" onclick="if(event.target===this)closeEditDirect()">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="editModalTitle">シナリオを追加</div>
      <button class="modal-close" onclick="closeEditDirect()">✕</button>
    </div>
    <div class="modal-body" id="editForm"></div>
  </div>
</div>

<!-- トークン設定モーダル -->
<div class="modal-overlay" id="tokenOverlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">GitHub Token設定</div>
      <button class="modal-close" onclick="document.getElementById('tokenOverlay').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:12px">Personal Access Token（repo権限）を入力してください。このデバイスのみに保存されます。</p>
      <div class="form-group">
        <label class="form-label">GitHub Token</label>
        <input class="form-input" id="tokenInput" type="password" placeholder="ghp_xxxxxxxxxxxx">
      </div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="document.getElementById('tokenOverlay').classList.remove('open')">キャンセル</button>
        <button class="btn-save" onclick="saveToken()">保存</button>
      </div>
    </div>
  </div>
</div>

<header>
  <div class="header-inner">
    <div>
      <div class="header-title">⛩ 行きたいシナリオ</div>

    </div>
    <div class="header-btns">
      <button class="add-btn" onclick="openAddModal()">＋ 追加</button>
    </div>
  </div>
</header>

const NINZU_ORDER = ['1PL','タイマン','タイマンor2PL','2PL','3PL','4PL','5PL以上','複数人'];
const GH_REPO    = '8i10/kp-scenario';
const GH_BRANCH  = 'main';
const GH_FILE    = 'yukitai.json';
const GH_API     = 'https://api.github.com/repos/' + GH_REPO + '/contents/' + GH_FILE;
const GH_TOKEN_KEY = 'gh_token_v1';
const SESS_KEY   = 'trpg_session_v2';
const ALLOWED_EMAIL = 'cracktrackxxxx@gmail.com';
const PASS_KEY   = 'trpg_pass_v2';

let DATA = [...SCENARIOS_DEFAULT];
let currentUser = null;
let editingIdx = null;
let loginCallback = null;

function getGHToken(){ return localStorage.getItem(GH_TOKEN_KEY)||''; }
function saveGHToken(t){ localStorage.setItem(GH_TOKEN_KEY,t); }
function ghHeaders(token){ return {'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'}; }
function getSession(){ try{return JSON.parse(localStorage.getItem(SESS_KEY)||'null');}catch{return null;} }
function saveSession(s){ localStorage.setItem(SESS_KEY,JSON.stringify(s)); }
async function hashPass(str){ const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str+'trpg_salt_9x')); return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join(''); }
function getSavedHash(){ return localStorage.getItem(PASS_KEY)||null; }
function savePassHash(h){ localStorage.setItem(PASS_KEY,h); }
function showLoading(on){ document.getElementById('loadingBanner').style.display=on?'flex':'none'; }


// ===== GitHub API =====
async function getFileSha(token){
  const res=await fetch(GH_API+'?t='+Date.now(),{headers:ghHeaders(token)});
  if(res.status===404) return null;
  return (await res.json()).sha||null;
}
async function apiGet(){
  const token=getGHToken();
  const headers=token?ghHeaders(token):{'Accept':'application/vnd.github.v3+json'};
  const res=await fetch(GH_API+'?t='+Date.now(),{headers});
  if(!res.ok) return null;
  const json=await res.json();
  return JSON.parse(decodeURIComponent(escape(atob(json.content.replace(/\n/g,'')))));
}
async function apiSave(newData){
  const token=getGHToken();
  if(!token) throw new Error('トークン未設定');
  const sha=await getFileSha(token);
  const body={message:'Update yukitai.json',content:btoa(unescape(encodeURIComponent(JSON.stringify(newData,null,2)))),branch:GH_BRANCH};
  if(sha) body.sha=sha;
  const res=await fetch(GH_API,{method:'PUT',headers:ghHeaders(token),body:JSON.stringify(body)});
  if(!res.ok){const e=await res.json();throw new Error(e.message||'GitHub API error');}
  return await res.json();
}
async function loadFromGitHub(){
  showLoading(true);
  try{
    const rows=await apiGet();
    if(Array.isArray(rows)) DATA=rows;
  }catch(e){ console.warn('取得失敗:',e); }
  showLoading(false);
  render();
}

// ===== 描画 =====
function render(){
  const area=document.getElementById('mainArea');
  const groups={};
  DATA.forEach((r,i)=>{
    if(!groups[r.ninzu]) groups[r.ninzu]=[];
    groups[r.ninzu].push({...r,_i:i});
  });
  Object.keys(groups).forEach(n=>{ groups[n].sort((a,b)=>(b.hot?1:0)-(a.hot?1:0)); });
  const order=NINZU_ORDER.filter(n=>groups[n]);
  Object.keys(groups).forEach(n=>{if(!order.includes(n))order.push(n);});
  if(!order.length){area.innerHTML='';return;}
  area.innerHTML=order.map(ninzu=>{
    const items=groups[ninzu].map(r=>{
      const namePart=r.url
        ?`<a class="card-name" href="${r.url}" target="_blank" rel="noopener">${r.name}</a>`
        :`<span class="card-name">${r.name}</span>`;
      const hoPart=r.ho?`<span class="card-ho">${r.ho}</span>`:'';
      const memoPart=r.memo?`<div class="card-meta">${r.memo}</div>`:'';
      const editBtn=currentUser?`<div class="card-actions"><button class="edit-btn" onclick="openEditModalIdx(${r._i})">✏️</button></div>`:'';
      return `<div class="card${r.hot?' hot':''}">
        <div class="card-body">
          <div class="card-row1">${namePart}${hoPart}</div>
          ${memoPart}
        </div>
        ${editBtn}
      </div>`;
    }).join('');
    return `<div class="section"><div class="section-title">${ninzu}</div><div class="card-list">${items}</div></div>`;
  }).join('');
}

// ===== フォーム =====
function buildForm(row){
  const f=v=>(v||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;');
  const ninzuList=['1PL','タイマン','タイマンor2PL','2PL','3PL','4PL','5PL以上','複数人'];
  const ninzuOpts=ninzuList.map(v=>`<option value="${v}"${(row.ninzu||'')==v?' selected':''}>${v}</option>`).join('');
  const delBtn=editingIdx!==null?'<button class="btn-delete" onclick="deleteScenario()">🗑 削除</button>':'';
  return `
  <div class="form-group">
    <label class="form-label">シナリオ名 *</label>
    <input class="form-input" id="f_name" value="${f(row.name)}" placeholder="シナリオ名">
  </div>
  <div class="form-group">
    <label class="form-label">人数</label>
    <select class="form-input" id="f_ninzu" style="appearance:none;-webkit-appearance:none;cursor:pointer">${ninzuOpts}</select>
  </div>
  <div class="form-group">
    <label class="form-label">シナリオURL</label>
    <input class="form-input" id="f_url" value="${f(row.url)}" placeholder="https://...">
  </div>
  <div class="form-group">
    <label class="form-label">希望HO</label>
    <input class="form-input" id="f_ho" value="${f(row.ho)}" placeholder="HO1 / HO探偵 など">
  </div>
  <div class="form-group">
    <label class="form-label">メモ</label>
    <textarea class="form-textarea" id="f_memo">${f(row.memo)}</textarea>
  </div>
  <div class="form-group">
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px">
      <input type="checkbox" id="f_hot" ${row.hot?'checked':''} style="width:16px;height:16px;cursor:pointer;accent-color:var(--accent)">
      <span>行きたさ強め（カードをオレンジに）</span>
    </label>
  </div>
  <div class="form-actions">
    ${delBtn}
    <button class="btn-cancel" onclick="closeEditDirect()">キャンセル</button>
    <button class="btn-save" onclick="saveScenario()">保存</button>
  </div>`;
}

function openAddModal(){
  editingIdx=null;
  document.getElementById('editModalTitle').textContent='シナリオを追加';
  document.getElementById('editForm').innerHTML=buildForm({ninzu:'2PL',name:'',url:'',ho:'',memo:'',hot:false});
  document.getElementById('editOverlay').classList.add('open');
}
function openEditModalIdx(i){
  editingIdx=i;
  document.getElementById('editModalTitle').textContent='編集：'+DATA[i].name;
  document.getElementById('editForm').innerHTML=buildForm(DATA[i]);
  document.getElementById('editOverlay').classList.add('open');
}
function closeEditDirect(){ document.getElementById('editOverlay').classList.remove('open'); }

async function saveScenario(){
  const name=document.getElementById('f_name').value.trim();
  if(!name){alert('シナリオ名を入力してください');return;}
  const row={
    id: editingIdx!==null ? DATA[editingIdx].id : Date.now().toString(),
    ninzu: document.getElementById('f_ninzu').value,
    name,
    url: document.getElementById('f_url').value.trim(),
    ho: document.getElementById('f_ho').value.trim(),
    memo: document.getElementById('f_memo').value.trim(),
    hot: document.getElementById('f_hot').checked,
  };
  if(editingIdx!==null){ DATA[editingIdx]=row; }
  else { DATA.push(row); }
  closeEditDirect();
  const token=getGHToken();
  if(!token){alert('🔑 トークンを設定してください');render();return;}
  showLoading(true);
  try{ await apiSave(DATA); await loadFromGitHub(); }
  catch(e){ alert('保存失敗: '+e.message); render(); }
  showLoading(false);
}

async function deleteScenario(){
  if(!confirm('「'+DATA[editingIdx].name+'」を削除しますか？')) return;
  DATA.splice(editingIdx,1);
  editingIdx=null;
  closeEditDirect();
  const token=getGHToken();
  if(!token){render();return;}
  showLoading(true);
  try{ await apiSave(DATA); await loadFromGitHub(); }
  catch(e){ alert('削除失敗: '+e.message); render(); }
  showLoading(false);
}

// ===== 認証 =====
(function autoLogin(){
  const s=getSession();
  if(s&&s.email===ALLOWED_EMAIL){ currentUser=s.email; updateAuthUI(); }

function updateAuthUI(){
  let bar=document.getElementById('authBar');
  if(currentUser){
    if(!bar){
      bar=document.createElement('div');
      bar.id='authBar';
      bar.style.cssText='position:fixed;top:0;left:0;right:0;z-index:9998;background:var(--surface2);border-bottom:1px solid var(--border);padding:4px 14px;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-muted);';
      document.body.appendChild(bar);
    }
    bar.innerHTML=`<span style="flex:1;opacity:.6">ログイン中</span>
      <button onclick="openTokenModal()" style="background:none;border:1px solid var(--accent);color:var(--accent);font-size:11px;padding:2px 10px;border-radius:6px;cursor:pointer;font-family:inherit">🔑 トークン設定</button>
      <button onclick="doLogout()" style="background:none;border:1px solid var(--border);color:var(--text-muted);font-size:11px;padding:2px 10px;border-radius:6px;cursor:pointer;font-family:inherit">ログアウト</button>`;
    document.querySelector('header').style.marginTop='30px';
  } else {
    if(bar) bar.remove();
    document.querySelector('header').style.marginTop='';
  }
  render();
}

function requireLogin(cb){
  if(currentUser){cb();return;}
  loginCallback=cb;
  showLoginForm();
  document.getElementById('loginOverlay').classList.add('open');
}
function showLoginForm(){
  document.getElementById('loginModalTitle').textContent='ログイン';
  document.getElementById('loginBody').innerHTML=`
    <div class="form-group"><label class="form-label">メールアドレス</label>
      <input class="form-input" id="loginEmail" type="email" placeholder="example@mail.com"></div>
    <div class="form-group"><label class="form-label">パスワード</label>
      <input class="form-input" id="loginPass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div id="loginErr" style="color:var(--r18);font-size:12px;margin-bottom:8px;display:none"></div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeLoginDirect()">キャンセル</button>
      <button class="btn-save" onclick="doLogin()">ログイン</button>
    </div>`;
}
function showLoginErr(m){ const e=document.getElementById('loginErr'); if(e){e.textContent=m;e.style.display='block';} }
function closeLoginDirect(){ loginCallback=null; document.getElementById('loginOverlay').classList.remove('open'); }

async function doLogin(){
  const email=(document.getElementById('loginEmail').value||'').trim().toLowerCase();
  const pass=document.getElementById('loginPass').value||'';
  if(!email||!pass){showLoginErr('入力してください');return;}
  if(email!==ALLOWED_EMAIL){showLoginErr('このメールアドレスは登録されていません');return;}
  if(pass.length<4){showLoginErr('パスワードは4文字以上');return;}
  const h=await hashPass(pass);
  const saved=getSavedHash();
  if(!saved){ savePassHash(h); }
  else if(saved!==h){showLoginErr('パスワードが違います');return;}
  const token=crypto.randomUUID?crypto.randomUUID():Math.random().toString(36).slice(2)+Date.now();
  saveSession({email,token});
  currentUser=email;
  updateAuthUI();
  closeLoginDirect();
  if(loginCallback){const cb=loginCallback;loginCallback=null;cb();}
}
function doLogout(){ localStorage.removeItem(SESS_KEY); currentUser=null; updateAuthUI(); }

// 追加・編集にログイン要求

  if(!t){alert('トークンを入力してください');return;}
  saveGHToken(t);
  document.getElementById('tokenOverlay').classList.remove('open');

}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeEditDirect();closeLoginDirect();document.getElementById('tokenOverlay').classList.remove('open');}
});
